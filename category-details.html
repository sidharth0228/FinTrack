<!DOCTYPE html>
<html lang="en">

<head>
    <script>
        (function() {
            if (localStorage.getItem('dark-mode') === 'enabled') {
                document.documentElement.classList.add('dark-mode');
            }
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Category Details - FinTrack</title>
    <link rel="stylesheet" href="style.css">
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            const themeToggle = document.getElementById('theme-toggle');
            if (themeToggle) {
                const updateIcon = (isDark) => {
                    themeToggle.innerHTML = isDark 
                        ? `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>`
                        : `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>`;
                };

                updateIcon(document.documentElement.classList.contains('dark-mode'));

                themeToggle.addEventListener('click', () => {
                    document.documentElement.classList.toggle('dark-mode');
                    const isDark = document.documentElement.classList.contains('dark-mode');
                    localStorage.setItem('dark-mode', isDark ? 'enabled' : 'disabled');
                    updateIcon(isDark);
                });
            }

            // Sync User Info
            const user = JSON.parse(localStorage.getItem('user'));
            if (user && document.querySelector('.avatar')) {
                document.querySelector('.avatar').innerText = user.name.split(' ').map(n => n[0]).join('').toUpperCase();
            }

            // Extract Category
            const urlParams = new URLSearchParams(window.location.search);
            const rawCategory = urlParams.get('category');
            
            if (!rawCategory) {
                window.location.href = 'budget.html';
                return;
            }
            
            // Re-encode or clean if needed. Browser handles it decently.
            const category = rawCategory.replace('/', ' / '); // handle exact casing if needed, but URL keeps it intact usually.
            // Let's use the exact rawCategory for fetching.
            document.getElementById('category-title').innerText = `${getIconForCategory(rawCategory)} ${rawCategory} History`;
            document.getElementById('category-input').value = rawCategory;

            // Handle Logout
            document.querySelectorAll('a').forEach(link => {
                if (link.innerText.includes('Log Out')) {
                    link.addEventListener('click', (e) => {
                        e.preventDefault();
                        localStorage.removeItem('token');
                        localStorage.removeItem('user');
                        window.location.href = 'login.html';
                    });
                }
            });

            fetchCategoryData(rawCategory);

            // Add Transaction Form
            document.getElementById('addTransactionForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                await handleTransactionSubmit(rawCategory);
            });
        });

        function getIconForCategory(cat) {
            const map = {
                'Rent / EMI': '🏠', 'Insurance': '🛡️', 'Utilities': '⚡', 'Subscriptions': '🎬',
                'Dining Out': '🍽️', 'Groceries': '🛒', 'Shopping': '🛍️', 'Transportation': '🚗', 'Miscellaneous': '🎯'
            };
            return map[cat] || '📄';
        }

        async function fetchCategoryData(category) {
            try {
                // Fetch from localStorage instead of Backend to bypass Token validation
                const expenses = JSON.parse(localStorage.getItem('localExpenses') || '[]');

                const now = new Date();
                const currentMonth = now.getMonth();
                const currentYear = now.getFullYear();

                const filteredExpenses = expenses.filter(e => {
                    const d = new Date(e.date);
                    return e.category === category && d.getMonth() === currentMonth && d.getFullYear() === currentYear;
                }).sort((a,b) => new Date(b.date) - new Date(a.date));

                const tbody = document.getElementById('transaction-tbody');
                tbody.innerHTML = '';

                let totalSpent = 0;

                if (filteredExpenses.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="3" class="text-center text-muted py-4">No transactions found for this month.</td></tr>`;
                } else {
                    filteredExpenses.forEach(exp => {
                        totalSpent += exp.amount;
                        const dateStr = new Date(exp.date).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
                        const isoDate = new Date(exp.date).toISOString().split('T')[0];
                        tbody.innerHTML += `
                            <tr>
                                <td>${dateStr}</td>
                                <td><div class="font-medium">${exp.title}</div></td>
                                <td class="text-right text-danger font-medium">₹${exp.amount.toLocaleString('en-IN', {minimumFractionDigits: 2})}</td>
                                <td class="text-right">
                                    <button onclick="editTransaction('${exp.id}', '${exp.title.replace(/'/g, "\\'")}', ${exp.amount}, '${isoDate}')" class="text-primary hover-scale mr-2" style="background:none; border:none; cursor:pointer;" title="Edit">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                                    </button>
                                    <button onclick="deleteTransaction('${exp.id}')" class="text-danger hover-scale" style="background:none; border:none; cursor:pointer;" title="Delete">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                                    </button>
                                </td>
                            </tr>
                        `;
                    });
                }
                
                document.getElementById('total-spent').innerText = `₹${totalSpent.toLocaleString('en-IN', {minimumFractionDigits: 2})}`;

            } catch (err) {
                console.error('Error fetching category data:', err);
            }
        }

        function editTransaction(id, title, amount, date) {
            document.getElementById('txn-id').value = id;
            document.getElementById('txn-title').value = title;
            document.getElementById('txn-amount').value = amount;
            document.getElementById('txn-date').value = date;
            
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.innerText = 'Update Transaction';
            submitBtn.classList.remove('btn-primary');
            submitBtn.classList.add('btn-warning');
        }

        function resetForm() {
            document.getElementById('addTransactionForm').reset();
            document.getElementById('txn-id').value = '';
            document.getElementById('txn-date').valueAsDate = new Date();
            
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.innerText = 'Add Transaction';
            submitBtn.classList.remove('btn-warning');
            submitBtn.classList.add('btn-primary');
        }

        async function deleteTransaction(id) {
            if (!confirm('Are you sure you want to delete this transaction?')) return;
            try {
                let expenses = JSON.parse(localStorage.getItem('localExpenses') || '[]');
                expenses = expenses.filter(e => e.id !== id);
                localStorage.setItem('localExpenses', JSON.stringify(expenses));

                const rawCategory = new URLSearchParams(window.location.search).get('category') || 'Miscellaneous';
                fetchCategoryData(rawCategory);
            } catch (err) {
                console.error('Error:', err);
            }
        }

        async function handleTransactionSubmit(category) {
            const id = document.getElementById('txn-id').value;
            const title = document.getElementById('txn-title').value;
            const amount = parseFloat(document.getElementById('txn-amount').value);
            const date = document.getElementById('txn-date').value;

            try {
                let expenses = JSON.parse(localStorage.getItem('localExpenses') || '[]');

                if (id) {
                    // Update existing
                    const index = expenses.findIndex(e => e.id === id);
                    if (index !== -1) {
                        expenses[index] = { ...expenses[index], title, amount, category, date };
                    }
                } else {
                    // Create new
                    expenses.push({ id: Date.now().toString(), title, amount, category, date });
                }

                localStorage.setItem('localExpenses', JSON.stringify(expenses));
                resetForm();
                fetchCategoryData(category);

            } catch (err) {
                console.error('Error:', err);
                alert('Error saving transaction');
            }
        }
    </script>
    <script src="navigation.js" defer></script>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <div class="flex items-center gap-4">
                    <a href="budget.html" class="btn btn-ghost" style="padding: 0.5rem; border-radius: 50%;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="19" y1="12" x2="5" y2="12"></line>
                            <polyline points="12 19 5 12 12 5"></polyline>
                        </svg>
                    </a>
                    <div class="page-title">Transaction Details</div>
                </div>
                
                <div class="user-profile">
                    <button id="theme-toggle" class="theme-toggle" title="Toggle Dark Mode" aria-label="Toggle Theme">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                        </svg>
                    </button>
                    <div class="avatar">JD</div>
                </div>
            </header>

            <div class="content-wrapper">

                <div class="flex justify-between items-center mb-6">
                    <div>
                        <h2 id="category-title" class="text-2xl mb-1">... History</h2>
                        <p class="text-muted">Review spending patterns and log new expenses for this category.</p>
                    </div>
                    <div class="text-right">
                        <div class="text-sm text-muted">Spent this month</div>
                        <div id="total-spent" class="text-3xl font-bold bg-clip-text text-danger">₹0.00</div>
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-6">

                    <!-- Transaction List -->
                    <div class="card" style="grid-column: span 2;">
                        <div class="card-header border-b pb-3" style="border-bottom: 1px solid var(--border-color);">
                            <h3 class="card-title m-0">Recent Activity</h3>
                        </div>
                        <div class="table-container mt-4">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Date</th>
                                        <th>Description</th>
                                        <th class="text-right">Amount</th>
                                        <th class="text-right">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="transaction-tbody">
                                    <!-- Dynamic Rows -->
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- Add Transaction -->
                    <div class="card">
                        <div class="card-header border-b pb-3" style="border-bottom: 1px solid var(--border-color);">
                            <h3 class="card-title m-0">Add Expense</h3>
                        </div>
                        <form id="addTransactionForm" class="mt-4">
                            <input type="hidden" id="txn-id">
                            <div class="form-group">
                                <label class="form-label">Subject</label>
                                <input type="text" id="category-input" class="form-control" disabled style="background-color: var(--bg-color); opacity: 0.7;">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Where / What</label>
                                <input type="text" id="txn-title" class="form-control" placeholder="e.g. Starbucks, Zomato" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Amount (₹)</label>
                                <input type="number" id="txn-amount" class="form-control" placeholder="0.00" step="0.01" min="0" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Date</label>
                                <input type="date" id="txn-date" class="form-control" required>
                            </div>
                            <button type="submit" id="submit-btn" class="btn btn-primary w-full" style="width: 100%;">Add Transaction</button>
                            <button type="button" class="btn btn-ghost w-full" style="width: 100%; margin-top: 0.5rem; text-align: center;" onclick="resetForm()">Cancel</button>
                        </form>
                    </div>
                </div>

            </div>
        </main>
    </div>
    <script>
        document.getElementById('txn-date').valueAsDate = new Date();
    </script>
</body>

</html>
