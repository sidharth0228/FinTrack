<!DOCTYPE html>
<html lang="en">

<head>
    <script>
        (function() {
            if (localStorage.getItem('dark-mode') === 'enabled') {
                document.documentElement.classList.add('dark-mode');
            }
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Advisor Report - FinTrack</title>
    <link rel="stylesheet" href="style.css">
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            const themeToggle = document.getElementById('theme-toggle');
            if (themeToggle) {
                const updateIcon = (isDark) => {
                    themeToggle.innerHTML = isDark 
                        ? `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>`
                        : `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>`;
                };
                updateIcon(document.documentElement.classList.contains('dark-mode'));
                themeToggle.addEventListener('click', () => {
                    document.documentElement.classList.toggle('dark-mode');
                    localStorage.setItem('dark-mode', document.documentElement.classList.contains('dark-mode') ? 'enabled' : 'disabled');
                    updateIcon(document.documentElement.classList.contains('dark-mode'));
                });
            }

            const user = JSON.parse(localStorage.getItem('user'));
            if (user && document.querySelector('.avatar')) {
                document.querySelector('.avatar').innerText = user.name.split(' ').map(n => n[0]).join('').toUpperCase();
            }

            // Handle Logout
            document.querySelectorAll('a').forEach(link => {
                if (link.innerText.includes('Log Out')) {
                    link.addEventListener('click', (e) => {
                        e.preventDefault();
                        localStorage.removeItem('token');
                        localStorage.removeItem('user');
                        window.location.href = 'login.html';
                    });
                }
            });

            generateFullReport();
        });

        async function generateFullReport() {
            const container = document.getElementById('report-container');
            container.innerHTML = `
                <div class="flex flex-col items-center justify-center py-20">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-primary mb-4"></div>
                    <h3 class="text-xl font-semibold">Running Technical Analysis...</h3>
                    <p class="text-muted">Comparing Portfolio Concentration & P&L Trends</p>
                </div>
            `;

            try {
                const response = await fetch('/api/stocks/ai-report', {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                
                if (!response.ok) throw new Error('Could not reach AI Advisor');
                const data = await response.json();
                
                const html = data.report
                    .replace(/^### (.*$)/gim, '<h3 style="margin-top:2rem; color:var(--primary-color)">$1</h3>')
                    .replace(/^## (.*$)/gim, '<h2 style="margin-top:2.5rem; color:var(--primary-color)">$2</h2>')
                    .replace(/^# (.*$)/gim, '<h1 style="margin-top:3rem; color:var(--primary-color)">$3</h1>')
                    .replace(/\*\*(.*?)\*\*/g, '<strong>$4</strong>')
                    .replace(/\n/g, '<br>');

                container.innerHTML = `
                    <div class="card p-8 animate-in fade-in slide-in-from-bottom" style="line-height: 1.8; font-size: 1.1rem;">
                        <div class="flex justify-between items-center mb-8 border-b pb-4">
                            <h2 class="text-2xl font-bold">Investment Ecosystem Report</h2>
                            <span class="badge badge-success">Live Analysis</span>
                        </div>
                        <div class="report-content">
                            ${data.report.replace(/\n/g, '<br>')}
                        </div>
                    </div>
                `;

            } catch (err) {
                container.innerHTML = `
                    <div class="card p-8 text-center border-danger">
                        <div class="text-4xl mb-4">⚠️</div>
                        <h3 class="text-xl font-bold text-danger">Advisor Unavailable</h3>
                        <p class="text-muted mb-6">${err.message}</p>
                        <button class="btn btn-primary" onclick="generateFullReport()">Try Again</button>
                    </div>
                `;
            }
        }
    </script>
    <script src="navigation.js" defer></script>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        

        <main class="main-content">
            <header class="topbar">
                <div class="page-title">Personalized Advisory Report</div>
                <div class="user-profile">
                    <button id="theme-toggle" class="theme-toggle">🌓</button>
                    <div class="avatar">JD</div>
                </div>
            </header>

            <div class="content-wrapper" id="report-container">
                <!-- Data will be injected here -->
            </div>
        </main>
    </div>
</body>
</html>
